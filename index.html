<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mangador de tareitas y tal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Mangador de tareitas y tal</h2>
        
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="¿Qué hay que hacer?">
            <button id="add-btn" onclick="addTask()">Agregar</button>
        </div>

        <div id="taskList"></div>
        
        <p id="empty-msg" style="display: none;">No hay tareas perdientes</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
